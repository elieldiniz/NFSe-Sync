appId: com.nfse.sync
productName: NFSe Sync Desktop

directories:
  output: release
  buildResources: resources

files:
  - out/**/*
  - package.json
  - resources/**/*

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico
  installerHeaderIcon: resources/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: NFSe Sync Desktop

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: resources/icon.png
  category: Office
  executableArgs:
    - --disable-gpu

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: resources/icon.icns
  category: public.app-category.business

publish:
  provider: github
  owner: ""
  repo: ""
